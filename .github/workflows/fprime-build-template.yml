name: F Prime Build Template

on:
  workflow_dispatch:  # Allow manual trigger
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      fprime-branch:
        required: true
        type: string

jobs:
  build-fprime-cache:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push F Prime cache image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.fprime
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/fprime-ref:${{ inputs.tag }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/fprime-ref:${{ inputs.tag }}
          cache-to: type=inline
          build-args: |
            FPRIME_VERSION=${{ inputs.fprime-branch }}
      
      - name: Image digest
        run: echo "Built image digest ${{ steps.docker_build.outputs.digest }}"
