name: Build VSCode Extensions

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'yarn.lock'
      - 'build.js'
      - '.github/workflows/build-vscode-extensions.yml'

jobs:
  build:
    name: Build and Package Extensions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            # Remove 'v' prefix if present
            SEMVER="${VERSION#v}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
            SEMVER="0.0.0-dev.$(git rev-parse --short HEAD)"
          fi

          # Detect pre-release versions (contain hyphen: -alpha, -beta, -rc, etc.)
          if [[ "$SEMVER" == *-* ]]; then
            IS_PRERELEASE="true"
            echo "Detected pre-release version"
          else
            IS_PRERELEASE="false"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (semver: $SEMVER, pre-release: $IS_PRERELEASE)"

      - name: Update package.json versions
        run: |
          # Update root package.json
          jq --arg version "${{ steps.version.outputs.semver }}" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json

          # Update core extension package.json
          jq --arg version "${{ steps.version.outputs.semver }}" '.version = $version' src/extensions/core/package.json > src/extensions/core/package.json.tmp
          mv src/extensions/core/package.json.tmp src/extensions/core/package.json

          # Update fprime extension package.json
          jq --arg version "${{ steps.version.outputs.semver }}" '.version = $version' src/extensions/fprime/package.json > src/extensions/fprime/package.json.tmp
          mv src/extensions/fprime/package.json.tmp src/extensions/fprime/package.json

          echo "Updated versions to ${{ steps.version.outputs.semver }}"
          echo "Core version: $(jq -r .version src/extensions/core/package.json)"
          echo "FPrime version: $(jq -r .version src/extensions/fprime/package.json)"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install vsce
        run: yarn global add @vscode/vsce

      - name: Build extensions
        run: yarn build

      - name: Package core extension
        run: |
          cd src/extensions/core
          vsce package --yarn -o ../../../hermes-${{ steps.version.outputs.version }}.vsix
          cd ../../..
          echo "Packaged core extension"
          ls -lh hermes-${{ steps.version.outputs.version }}.vsix

      - name: Package fprime extension
        run: |
          cd src/extensions/fprime
          vsce package -o ../../../hermes-fprime-${{ steps.version.outputs.version }}.vsix
          cd ../../..
          echo "Packaged fprime extension"
          ls -lh hermes-fprime-${{ steps.version.outputs.version }}.vsix

      - name: Upload core extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-${{ steps.version.outputs.version }}
          path: hermes-${{ steps.version.outputs.version }}.vsix
          retention-days: 30

      - name: Upload fprime extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-fprime-${{ steps.version.outputs.version }}
          path: hermes-fprime-${{ steps.version.outputs.version }}.vsix
          retention-days: 30

      - name: Upload extensions to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            hermes-${{ steps.version.outputs.version }}.vsix
            hermes-fprime-${{ steps.version.outputs.version }}.vsix
          prerelease: ${{ steps.version.outputs.is_prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Get version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          # Remove 'v' prefix if present
          SEMVER="${VERSION#v}"

          # Detect pre-release versions (contain hyphen: -alpha, -beta, -rc, etc.)
          if [[ "$SEMVER" == *-* ]]; then
            IS_PRERELEASE="true"
            PRERELEASE_FLAG="--pre-release"
            echo "Detected pre-release version"
          else
            IS_PRERELEASE="false"
            PRERELEASE_FLAG=""
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "prerelease_flag=$PRERELEASE_FLAG" >> $GITHUB_OUTPUT
          echo "Publishing version: $SEMVER (pre-release: $IS_PRERELEASE)"

      - name: Update package.json versions
        run: |
          # Update root package.json
          jq --arg version "${{ steps.version.outputs.semver }}" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json

          # Update core extension package.json
          jq --arg version "${{ steps.version.outputs.semver }}" '.version = $version' src/extensions/core/package.json > src/extensions/core/package.json.tmp
          mv src/extensions/core/package.json.tmp src/extensions/core/package.json

          # Update fprime extension package.json
          jq --arg version "${{ steps.version.outputs.semver }}" '.version = $version' src/extensions/fprime/package.json > src/extensions/fprime/package.json.tmp
          mv src/extensions/fprime/package.json.tmp src/extensions/fprime/package.json

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install vsce
        run: yarn global add @vscode/vsce

      - name: Build extensions
        run: yarn build

      - name: Publish core extension to marketplace
        run: |
          cd src/extensions/core
          vsce publish --yarn ${{ steps.version.outputs.prerelease_flag }} -p ${{ secrets.VSCE_PAT }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish fprime extension to marketplace
        run: |
          cd src/extensions/fprime
          vsce publish ${{ steps.version.outputs.prerelease_flag }} -p ${{ secrets.VSCE_PAT }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
