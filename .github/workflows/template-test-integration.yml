name: F Prime Integration Test Template

on:
  workflow_call:
    inputs:
      fprime-tag:
        required: true
        type: string

jobs:
  integration-test:
    runs-on: ubuntu-latest
    env:
      FPRIME_IMAGE: ghcr.io/${{ github.repository }}/fprime-ref:${{ inputs.fprime-tag }}

    steps:
      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull prebuilt F Prime image
        run: docker pull ${{ env.FPRIME_IMAGE }}

      - name: Run integration tests
        run: make test-integration

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: |
            coverage.out
            test-results.json
