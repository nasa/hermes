syntax = "proto3";
option go_package = "github.com/nasa/hermes/pkg/grpc";

import "google/protobuf/empty.proto";

import "dictionary.proto";
import "file.proto";
import "fsw.proto";
import "bus.proto";
import "profile.proto";
import "msg.proto";

// Public service for interacting with the Hermes state
service Api {
  /**
   * Send a command sequence to the FSW to execute.
   *
   * If the FSW connection does not implement this endpoint directly,
   * this becomes a pseudo-endpoint that will wrap the 'Command' and allow
   * running commands in sequence. This is preferrable to successive
   * calls to 'Command' because commands are grouped together into
   * a single 'Trace' for easily tracking what was sent to the system.
   *
   * Metadata:
   *  "id": [fsw-id]
   *
   * TODO(tumbar) We will probably want to expand this to add some identifying
   * metadata to allow linking back to the code cell in our Notebooks
   *
   * Optional Metadata
   *  Keep executing the sequence even if
   *  "keepGoingOnFailure": "x"
   */
  rpc Sequence(hermes.CommandSequence) returns (hermes.SequenceReply);

  /**
   * A wrapper endpoint around Sequence/RawCommand.
   * This endpoint will parse a sequence and run it through Sequence.
   */
  rpc RawSequence(hermes.RawCommandSequence) returns (hermes.SequenceReply);

  /**
   * Send a command to the FSW. Wait for
   * completion or otherwise, up to the
   * plugin to decide when the promise resolves.
   *
   * Metadata:
   *  "id": [fsw-id]
   */
  rpc Command(hermes.CommandValue) returns (hermes.Reply);

  /**
   * Send a custom request to the FSW. Requests
   * are not defined in the dictionary. The request
   * payload data is defined by an agreement between
   * the frontend request initiator and the connection
   * implementation.
   *
   * Metadata:
   *  "id": [fsw-id]
   */
  rpc Request(hermes.RequestValue) returns (hermes.RequestReply);

  /**
   * Send a 'raw' command to the FSW. A raw command
   * differs from a full command in that it must be parsed
   * by the backend. Each FSW must support converting an argument list
   * to a command value and passing it to the "real" Command() interface.
   * Wait for completion or otherwise, up to the
   * plugin to decide when the promise resolves.
   *
   * Metadata:
   *  "id": [fsw-id]
   */
  rpc RawCommand(hermes.RawCommandValue) returns (hermes.Reply);

  /**
   * Uplink a file to the FSW.
   *
   * Metadata:
   *  "id": [fsw-id]
   */
  rpc Uplink(stream hermes.UplinkFileChunk) returns (hermes.Reply);

  // Get FSW metadata given its ID
  rpc GetFsw(hermes.Id) returns (hermes.Fsw);

  // Get all the current connected FSWs
  rpc AllFsw(google.protobuf.Empty) returns (hermes.FswList);

  // Subscribe to any changes to FSW connections state
  rpc SubscribeFsw(google.protobuf.Empty) returns (stream hermes.FswList);

  // Start a profile and return once it's connected (cancellable)
  rpc StartProfile(hermes.Id) returns (google.protobuf.Empty);

  // Stop profile given its name/id and reutrn once its stopped (cancellable)
  rpc StopProfile(hermes.Id) returns (google.protobuf.Empty);

  // Update a profile
  rpc UpdateProfile(hermes.ProfileUpdate) returns (google.protobuf.Empty);

  // Create a new Profile and return it's ID
  rpc AddProfile(hermes.Profile) returns (hermes.Id);

  // Delete a profile by its id
  rpc RemoveProfile(hermes.Id) returns (google.protobuf.Empty);

  // Get all the profiles
  rpc AllProfiles(google.protobuf.Empty) returns (hermes.ProfileList);

  // Get all the registered profile providers
  rpc AllProviders(google.protobuf.Empty) returns (hermes.ProfileProviderList);

  // Get the current file downlink/uplink state
  rpc GetFileTransferState(google.protobuf.Empty) returns (hermes.FileTransferState);

  // Clear the cached downlink transfer state
  rpc ClearDownlinkTransferState(google.protobuf.Empty) returns (google.protobuf.Empty);

  // Clear the cached uplink transfer state
  rpc ClearUplinkTransferState(google.protobuf.Empty) returns (google.protobuf.Empty);

  // Get notified when the set of profile providers updates
  rpc SubscribeProviders(google.protobuf.Empty)
  returns (stream hermes.ProfileProviderList);

  // Get notified when the set of profile or their internal state updates
  rpc SubscribeProfiles(google.protobuf.Empty) returns (stream hermes.ProfileList);

  /**
   * Get a dictionary by its ID
   * Metadata (optional)
   *  The dictionary "sections" to include in the reply.
   *  This is a whitelist set of options to include. If this
   *  list is not provided or empty, the entire dictionary will be transmitted
   *
   *  A "section" includes two parts [namespace].[definition-id]
   *  - namespace: Name of the namespace to include
   *  - section: The portion of the namespace to include, the following sections are valid
   *    - "commands": All the command definitions in this namespace
   *    - "events": All event definitions this namespaces
   *    - "telemetry": All telemetry definitions this namespaces
   *    - "parameters": All parameter definitions this namespaces
   *    - "*": The entire namespace
   *  Example: "sections": [".events", "ns-1.*", "ns-2.telemetry"]
   */
  rpc GetDictionary(hermes.Id) returns (hermes.Dictionary);

  // Add a new dictionary entry, return it's ID.
  rpc AddDictionary(hermes.Dictionary) returns (hermes.Id);

  // Remove specified dictionary
  rpc RemoveDictionary(hermes.Id) returns (google.protobuf.Empty);

  // Get all registered dictionaries as a sequential stream
  rpc AllDictionary(google.protobuf.Empty) returns (hermes.DictionaryList);

  // Subscribe to changes to the dictionary state. streams { id, type }
  rpc SubscribeDictionary(google.protobuf.Empty) returns (stream hermes.DictionaryList);

  // Subscribe to the event message bus
  rpc SubEvent(hermes.BusFilter) returns (stream hermes.SourcedEvent);

  // Subscribe to the telemetry message bus
  rpc SubTelemetry(hermes.BusFilter) returns (stream hermes.SourcedTelemetry);

  // Subscribe to the file downlink message bus
  rpc SubFileDownlink(hermes.BusFilter) returns (stream hermes.FileDownlink);

  // Subscribe to the file downlink message bus
  rpc SubFileUplink(hermes.BusFilter) returns (stream hermes.FileUplink);

  // Subscribe to the aggregated state of file uplink and downlink
  rpc SubFileTransfer(google.protobuf.Empty) returns (stream hermes.FileTransferState);
}

// API to provide interfaces with external software
service Provider {
  /**
   * A long lived connection telling the host that a link is active with
   * some external software (FSW). The server streams in uplink requests which
   * are handled and replied to over this long lived connection.
   *
   * Any downlink comming from this FSW is routed through the other client stream endpoints.
   */
  rpc Connection(stream hermes.FswConnectionPacket) returns (stream hermes.Uplink);

  /**
   * Initiate a file downlink session with the host.
   *
   * This request is for a single file downlink session.
   * It should start with a FileHeader and stream byte data
   *
   * TODO(tumbar) Figure out a mechanism for file validation
   */
  rpc File(stream hermes.DownlinkFileChunk) returns (google.protobuf.Empty);

  /**
   * Stream events to the host.
   * The client can open as many of these as needed though they should be long-lived.
   */
  rpc Event(stream hermes.SourcedEvent) returns (google.protobuf.Empty);

  /**
   * Stream telemetry to the host.
   * The client can open as many of these as needed though they should be long-lived.
   */
  rpc Telemetry(stream hermes.SourcedTelemetry) returns (google.protobuf.Empty);
}
