syntax = "proto3";
option go_package = "github.com/nasa/hermes/pkg/grpc";
package hermes;

import "google/protobuf/empty.proto";

import "dictionary.proto";
import "file.proto";
import "msg.proto";
import "query.proto";

// Endpoints associated with the global
service Global {
  // Get instance metadata given its ID
  rpc GetInstance(Id) returns (Instance);

  // Get all the current connected FSWs
  rpc AllInstances(google.protobuf.Empty) returns (InstanceList);

  // Subscribe to any changes to instance state
  rpc SubscribeInstances(google.protobuf.Empty) returns (stream InstanceList);

  // Get the current file downlink/uplink state
  rpc GetFileTransferState(google.protobuf.Empty) returns (FileTransferState);

  // Subscribe to the aggregated state of file uplink and downlink
  rpc SubscribeFileTransfer(google.protobuf.Empty) returns (stream FileTransferState);

  // Clear the cached downlink transfer state
  rpc ClearDownlinkTransferState(google.protobuf.Empty) returns (google.protobuf.Empty);

  // Clear the cached uplink transfer state
  rpc ClearUplinkTransferState(google.protobuf.Empty) returns (google.protobuf.Empty);
}

// Global message bus endpoints
service GlobalBus {
  // Subscribe to a generic message bus
  // For instance scoped message buses use `/<instance-id>/<bus-name>`
  rpc Subscribe(Id) returns (stream BusMessage);

  // Emit a message on an arbitrary bus
  rpc Emit(EmitBus) returns (google.protobuf.Empty);

  // Subscribe to the file downlink message bus
  rpc SubscribeFileDownlink(google.protobuf.Empty) returns (stream FileDownlink);

  // Subscribe to the file downlink message bus
  rpc SubscribeFileUplink(google.protobuf.Empty) returns (stream FileUplink);
}

// Realtime telemetry message bus endpoints
service RealtimeBus {
  // Subscribe to the global event message bus
  rpc SubscribeEvent(Id) returns (stream Event);

  // Emit a stored event
  rpc EmitEvent(EmitEvent) returns (google.protobuf.Empty);

  // Subscribe to the global [stored] telemetry message bus
  rpc SubscribeTelemetry(Id) returns (stream Telemetry);

  // Emit an realtime event
  rpc EmitTelemetry(EmitTelemetry) returns (google.protobuf.Empty);
}

// Stored telemetry message bus endpoints
service StoredBus {
  // Subscribe to the global event message bus
  rpc SubscribeEvent(Id) returns (stream Event);

  // Emit a stored event
  rpc EmitEvent(EmitEvent) returns (google.protobuf.Empty);

  // Subscribe to the global [stored] telemetry message bus
  rpc SubscribeTelemetry(Id) returns (stream Telemetry);

  // Emit an realtime event
  rpc EmitTelemetry(EmitTelemetry) returns (google.protobuf.Empty);
}

// Endpoints related to interacting with a single instance
service Instance {
  /**
   * Send a command sequence to the FSW to execute.
   *
   * If the FSW connection does not implement this endpoint directly,
   * this becomes a pseudo-endpoint that will wrap the 'Command' and allow
   * running commands in sequence. This is preferrable to successive
   * calls to 'Command' because commands are grouped together into
   * a single 'Trace' for easily tracking what was sent to the system.
   */
  rpc Sequence(SequenceRequest) returns (SequenceReply);

  /**
   * A wrapper endpoint around Sequence/RawCommand.
   * This endpoint will parse a sequence and run it through Sequence.
   */
  rpc RawSequence(RawCommandSequenceRequest) returns (SequenceReply);

  /**
   * Send a command to the FSW. Wait for
   * completion or otherwise, up to the
   * plugin to decide when the promise resolves.
   */
  rpc Command(CommandRequest) returns (google.protobuf.Empty);

  // Call a service registered with Hermes
  // This call will block until a reply is received
  rpc CallService(ServiceCall) returns (Reply);

  /**
   * Send a 'raw' command to the FSW. A raw command
   * differs from a full command in that it must be parsed
   * by the backend. Each FSW must support converting an argument list
   * to a command value and passing it to the "real" Command() interface.
   * Wait for completion or otherwise, up to the
   * plugin to decide when the promise resolves.
   */
  rpc RawCommand(RawCommandRequest) returns (Reply);

  // Uplink a file to the instance.
  rpc FileUplink(stream UplinkFileChunk) returns (Reply);

  // Downlink a file to the ground
  // This should only be called by a Hermes service
  rpc FileDownlink(stream DownlinkFileChunk) returns (Reply);

  /**
   * Get a dictionary by its instance ID
   * Metadata (optional)
   *  The dictionary "sections" to include in the reply.
   *  This is a whitelist set of options to include. If this
   *  list is not provided or empty, the entire dictionary will be transmitted
   *
   *  A "section" includes two parts [namespace].[definition-id]
   *  - namespace: Name of the namespace to include
   *  - section: The portion of the namespace to include, the following sections are valid
   *    - "commands": All the command definitions in this namespace
   *    - "events": All event definitions this namespaces
   *    - "telemetry": All telemetry definitions this namespaces
   *    - "parameters": All parameter definitions this namespaces
   *    - "*": The entire namespace
   *  Example: "sections": [".events", "ns-1.*", "ns-2.telemetry"]
   */
  rpc GetDictionary(DictionaryRequest) returns (Dictionary);
}

// Query persisted data
service Query {
  // Get all files downlinked in a time range
  rpc QueryFileDownlink(Query) returns (stream FileDownlink);

  // Get all files uplinked in a time range
  rpc QueryFileUplink(Query) returns (stream FileUplink);

  // Queried stored telemetry
  rpc QueryTelemetry(TelemetryQuery) returns (stream TelemetryTable);

  // Get all events in a time range
  rpc QueryEvents(Query) returns (stream Event);

  // Get the last value of a channel.
  rpc QueryLastTelemetry(QueryLast) returns (TelemetrySample);

  // Get the last occurance of an event
  rpc QueryLastEvent(QueryLast) returns (Event);
}
