syntax = "proto3";
option go_package = "github.com/nasa/hermes/pkg/pb";

message ProfileProvider {
  string name = 1;

  /* JSON schema describing the parameters to be passed to the profile */
  string schema = 2;

  /* (optional) React JSON Schema Form UI Schema */
  string uiSchema = 3;
}

message Profile {
  // Name of the profile, must be unique across all profiles
  string name = 1;

  // Profile this corresponds to
  string provider = 2;

  /* JSON parameters that fill in the provider schema */
  string settings = 3;
}

enum ProfileState {
  PROFILE_IDLE = 0;
  PROFILE_CONNECTING = 1;
  PROFILE_ACTIVE = 2;
  PROFILE_DISCONNECT = 3;
}

