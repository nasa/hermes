syntax = "proto3";
option go_package = "github.com/nasa/hermes/pkg/pb";
package hermes;

import "type.proto";

message ParameterDef {
  int32 id = 1;

  /**
   * Component or module that owns this parameter
   */
  string component = 2;

  /**
   * Name of the parameter
   * Scoped by its component
   */
  string name = 3;

  Type type = 4;

  string metadata = 5;
}

// ============================================================================
// XTCE Common Definitions
// ============================================================================

/**
 * Common metadata shared by all XTCE definitions (commands, telemetry, parameters).
 * This is reusable across different XTCE item types.
 */
message XtceDef {
  string name = 1;                         // Local name (e.g., "CMD_NO_OP", "TEMP_SENSOR")
  string qualified_name = 2;               // Full XTCE path (e.g., "/Mission/System/CMD_NO_OP")
  optional string short_description = 3;   // Brief description
  optional string long_description = 4;    // Detailed description (may include HTML)
  map<string, string> ancillary_data = 5;  // XTCE AncillaryData key-value pairs
}

// ============================================================================
// XTCE Command Definitions
// ============================================================================

/**
 * XTCE command definition with flattened inheritance structure.
 * This represents a single command that can be sent to the spacecraft.
 */
message CommandDef {
  XtceDef def = 1;                         // Common XTCE metadata
  bool abstract = 2;                       // True if this is an abstract command (not instantiable)

  // Command arguments (flattened from inheritance chain)
  repeated ArgumentDef arguments = 3;

  // Input validation constraints (checked before sending)
  // These determine if the command CAN be sent, not whether it executed successfully
  repeated TransmissionConstraint transmission_constraints = 4;
}

/**
 * Command argument definition.
 * Arguments are inputs that must be provided when sending the command.
 */
message ArgumentDef {
  XtceDef def = 1;                         // Common XTCE metadata
  Type type = 2;                           // Argument data type
  optional Value initial_value = 3;        // Default value if not provided
}

// Note: Execution verifiers (tracking command lifecycle stages) are NOT exposed
// in protobuf. Those are backend-only logic in hermes-data for tracking whether
// commands were received, accepted, executed, etc. The frontend only needs to know
// input validation constraints (can I send this command?), not execution tracking.

// ============================================================================
// XTCE Transmission Constraints (Input Validation)
// ============================================================================

/**
 * Comparison operators for constraint checks.
 */
enum ComparisonOperator {
  EQUAL = 0;                               // ==
  NOT_EQUAL = 1;                           // !=
  LESS_THAN = 2;                           // <
  GREATER_THAN = 3;                        // >
  LESS_THAN_OR_EQUAL = 4;                  // <=
  GREATER_THAN_OR_EQUAL = 5;               // >=
}

/**
 * Parameter comparison constraint.
 * Command can only be sent if a telemetry parameter meets a condition.
 * Example: "MotorTemperature" < 80.0 (can't send motor command if too hot)
 */
message ParameterComparison {
  string parameter_ref = 1;                // Qualified name of parameter to check
  ComparisonOperator operator = 2;         // Comparison operator
  Value value = 3;                         // Value to compare against
}

/**
 * Time window constraint.
 * Command can only be sent within a specific time window.
 * Example: Software update commands only allowed during maintenance windows.
 */
message TimeWindow {
  optional string start_time = 1;          // ISO 8601 timestamp (optional = unbounded start)
  optional string end_time = 2;            // ISO 8601 timestamp (optional = unbounded end)
}

/**
 * Boolean expression constraint.
 * Logical expression of multiple conditions.
 */
message BooleanExpression {
  string expression = 1;                   // Expression string (format TBD)
  string description = 2;                  // Human-readable description
}

/**
 * Transmission constraint from XTCE.
 * These must be satisfied BEFORE sending a command to determine if the
 * command CAN be sent. They validate argument values, system state, and time windows.
 */
message TransmissionConstraint {
  string description = 1;                  // Human-readable description

  // Constraint check (one of these)
  oneof constraint {
    ParameterComparison parameter_comparison = 2;  // Check telemetry parameter value
    TimeWindow time_window = 3;                    // Only valid during time window
    BooleanExpression boolean_expression = 4;      // Logical expression
  }
}

enum EvrSeverity {
  EVR_DIAGNOSTIC    = 0;
  EVR_ACTIVITY_LOW  = 1;
  EVR_ACTIVITY_HIGH = 2;
  EVR_WARNING_LOW   = 3;
  EVR_WARNING_HIGH  = 4;
  EVR_COMMAND       = 5;
  EVR_FATAL         = 6;
}

// Format specifier types following FPP specification
enum FormatSpecifierType {
  // Default/generic conversion
  FMT_DEFAULT = 0;        // {} -> %v

  // Integer conversions
  FMT_CHAR = 1;           // {c} -> %c
  FMT_DECIMAL = 2;        // {d} -> %d
  FMT_HEX_LOWER = 3;      // {x} -> %x
  FMT_HEX_UPPER = 4;      // {X} -> %X
  FMT_OCTAL = 5;          // {o} -> %o

  // Floating-point conversions
  FMT_EXP_LOWER = 6;      // {e} -> %e
  FMT_EXP_UPPER = 7;      // {E} -> %E
  FMT_FIXED_LOWER = 8;    // {f} -> %f
  FMT_FIXED_UPPER = 9;    // {F} -> %F
  FMT_GENERAL_LOWER = 10; // {g} -> %g
  FMT_GENERAL_UPPER = 11; // {G} -> %G
}

message FormatSpecifier {
  // Type of format specifier (d, f, x, etc.)
  FormatSpecifierType type = 1;

  // Optional precision (digits after decimal point)
  // For {.3f} this would be 3
  optional uint32 precision = 2;

  // Index into the arguments array (0-based)
  // This connects the specifier to its corresponding argument
  uint32 argument_index = 3;
}

message FormatFragment {
  oneof fragment {
    // Plain text segment
    string text = 1;

    // Format specifier with metadata
    FormatSpecifier specifier = 2;
  }
}

message FormatString {
  // Ordered list of text and format specifier fragments
  repeated FormatFragment fragments = 1;

  // Original format string (for debugging and backward compatibility)
  string original = 2;
}

message EventDef {
  int32 id = 1;

  /**
   * Component or module
   */
  string component = 2;

  /**
   * Name of the EVR.
   * Scoped by its component
   */
  string name = 3;

  /**
   * Log severity usually stored in the FSW event dictionary
   * For the most part this information is not held in the
   * EVR packet since its redundant for ground software.
   */
  EvrSeverity severity = 4;

  /**
   * DEPRECATED: Use format instead
   * printf format string that will be formatted via sprintf
   */
  string format_string = 5 [deprecated = true];

  /**
   * Arguments used inside the format string
   */
  repeated Field arguments = 6;

  string metadata = 7;

  /**
   * Structured format string with parsed fragments
   */
  FormatString format = 8;
}

message EventRef {
  int32           id        = 1;
  string          name      = 2;
  string          component = 3;
  EvrSeverity     severity  = 4;
  repeated string arguments = 5;

  // (optional) dictionary ID this comes from
  string dictionary = 10;
}

message TelemetryDef {
  /**
   * Raw ID used for identifying incoming serialized telemetry
   */
  int32 id = 1;

  /**
   * Telemetry name
   */
  string name = 2;

  /**
   * Component or module that owns this telemetry
   */
  string component = 3;

  /**
   * Serialization type
   */
  Type type = 4;

  reserved 5;

  string metadata = 6;
}

// Lightweight reference for passing dictionary items through message busses
message TelemetryRef {
  reserved 1, 2, 3;
  string instance_id = 4;
  string qualified_name = 5;
}

message DictionaryHead {
  /**
   * Type associated with the Fsw.type
   * This will filter the user's selection
   * of dictionaries that can be tracked.
   *
   * This is set by the provider.
   */
  string type = 1;

  // Name given to dictionary, can be changed by the user
  string name = 2;

  // (optional) Dictionary/FSW release version
  string version = 3;
}

message DictionaryNamespace {
  // Map keys have per-dictionary/mission meaning
  // All items will be constructor into a DualKeyMap with id+key
  map<string, CommandDef>   commands   = 1;
  map<string, EventDef>     events     = 2;
  map<string, TelemetryDef> telemetry  = 3;
  map<string, ParameterDef> parameters = 4;

  // Types that are externally referenced
  // These are resolved on loading
  map<string, Type> types = 5;
}

message Dictionary {
  DictionaryHead                   head     = 1;
  map<string, DictionaryNamespace> content  = 2;
  map<string, string>              metadata = 3;

  // (optional) This dictionary is externally managed and should be persisted
  // in the non-volatile Hermes state. If this ID is non-unique with an already
  // added dictionary, the overlapping dictionary will be removed.
  string id = 4;
}
